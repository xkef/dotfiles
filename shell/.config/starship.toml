command_timeout = 1000

format = """
${custom.cwd}\
$character"""

right_format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
${custom.jj_change}\
${custom.jj_status}\
${custom.java}\
$python\
$nodejs\
$docker_context"""

[character]
success_symbol = '[ŌØ»](bold green)'
error_symbol = '[ŌØ»](bold red)'

[directory]
truncation_length = 8
truncate_to_repo = false
fish_style_pwd_dir_length = 1
truncation_symbol = 'ŌĆ”/'
style = 'dimmed cyan'

[git_branch]
format = '[$symbol$branch]($style) '
symbol = ' '
style = 'purple'

[git_status]
format = '($stashed$staged$modified$untracked$conflicted$ahead_behind)'
stashed = '[*${count}](yellow) '
staged = '[+${count}](green) '
modified = '[!${count}](red) '
untracked = '[?${count}](blue) '
conflicted = '[=${count}](bold red) '
ahead = '[ŌćĪ${count}](green) '
behind = '[ŌćŻ${count}](red) '
diverged = '[ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}](bold red) '

[git_metrics]
disabled = false
added_style = 'green'
deleted_style = 'red'
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[custom.java]
command = 'mise current java 2>/dev/null'
detect_extensions = ['java', 'class', 'gradle', 'jar', 'cljs', 'cljc']
detect_files = [
  'pom.xml',
  'build.gradle.kts',
  'build.sbt',
  '.java-version',
  'deps.edn',
  'project.clj',
  'build.boot',
  '.sdkmanrc',
]
format = '[ $output]($style) '
style = 'red'

[python]
format = '[$symbol($version)($virtualenv)]($style) '
symbol = ' '

[nodejs]
format = '[$symbol($version)]($style) '
symbol = ' '

[docker_context]
format = '[$symbol$context]($style) '
symbol = ' '

# --ignore-working-copy skips the working-copy snapshot (the cost that scales
# with repo size); the prompt reflects the last snapshot, refreshed on any real
# jj command.
[custom.jj_change]
command = '''jj --ignore-working-copy log --no-graph -r @ -T 'separate(" ", change_id.shortest(8), bookmarks.join(", "))' 2>/dev/null'''
when = 'jj --ignore-working-copy root 2>/dev/null'
format = '[ $output]($style) '
style = 'purple'

# Flags + A/M/D file counts from a single template call (no jj diff subprocess).
[custom.jj_status]
command = '''jj --ignore-working-copy log --no-graph -r @ -T 'separate("", if(conflict, "ŌÜĀ "), if(empty, "Ōłģ "), if(diff.files().filter(|f| f.status()=="added").len() > 0, "+" ++ diff.files().filter(|f| f.status()=="added").len() ++ " "), if(diff.files().filter(|f| f.status()=="modified").len() > 0, "!" ++ diff.files().filter(|f| f.status()=="modified").len() ++ " "), if(diff.files().filter(|f| f.status()=="deleted").len() > 0, "-" ++ diff.files().filter(|f| f.status()=="deleted").len() ++ " "))' 2>/dev/null'''
when = 'jj --ignore-working-copy root 2>/dev/null'
format = '($output)'
style = 'yellow'

[custom.cwd]
command = 'basename "$PWD"'
when = true
format = '[$output](bold cyan) '
