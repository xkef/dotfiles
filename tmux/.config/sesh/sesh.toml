#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

sort_order = ["tmux", "config", "zoxide"]

[default_session]
preview_command = "eza -la --group-directories-first --git --icons --color=always {}"

[[session]]
name = "dotfiles"
path = "~/dotfiles/"

[[wildcard]]
pattern = "~/code/*"

[[wildcard]]
pattern = "~/work/*"

[[wildcard]]
pattern = "~/personal/*"
