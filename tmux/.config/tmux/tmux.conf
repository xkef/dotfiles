# ── Version detection ──────────────────────────────────
%hidden TMUX_VERSION="#{s|next-||:#{version}}"
%hidden IS_TMUX_3_4_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.4}"
%hidden IS_TMUX_3_5_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.5}"
%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"

# ── Vim-mode state machine ───────────────────────────
%hidden NORMAL=0
%hidden VISUAL=1
%hidden VISUAL_LINE=2
%hidden VISUAL_BLOCK=3
set -g @mode $NORMAL

# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
 # better modifier key handling
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# undercurl + colored underlines + synchronized output
set -as terminal-features ',*:usstyle'
set -as terminal-features ',*:sync'

set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5         # sysstat refresh (lower = more forks)
set -g focus-events on
set -g set-clipboard on          # enable OSC 52 clipboard
set -g allow-passthrough on      # let OSC sequences reach the terminal
set -sg escape-time 0            # no delay for escape
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber on close
setw -g aggressive-resize on     # resize to smallest *viewing* client

# ── Prefix ────────────────────────────────────────────
# Ctrl-Space as prefix (wincent-style):
#   Space is the vim leader; Ctrl-Space is the tmux prefix.
#   Same physical key, Ctrl is the only differentiator.
#   Neither shadows anything useful: C-a is readline, C-b is page-up.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Ctrl-Space Ctrl-Space → toggle last window (like vim's C-^)
bind ^space last-window

# ── Keybindings ───────────────────────────────────────
# Reload config
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "Config reloaded"

# Clear scrollback (analogous to bare C-l clearing the terminal)
bind C-l clear-history

# ── Smart pane navigation (tmux ↔ neovim) ────────────
# prefix + h/j/k/l move between tmux panes *and* neovim splits.
# When the active pane runs neovim, the key is forwarded so smart-splits.nvim
# handles it; otherwise tmux selects the adjacent pane directly.
# Using prefix (not bare C-hjkl) so zsh line-editing keys stay available.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
bind h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Split panes (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Window swapping (repeatable)
bind -r '<' swap-window -d -t '{previous}'
bind -r '>' swap-window -d -t '{next}'

# ── FZF integration ──────────────────────────────────
# prefix + f → tmux-sessionizer (fzf project switcher)
bind f run-shell "tmux neww tmux-sessionizer"

# prefix + F → fzf switch between existing sessions
bind F display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --header 'switch session' \
    --preview 'tmux capture-pane -ep -t {}' | \
  xargs tmux switch-client -t"

# prefix + w → fzf switch between windows (all sessions)
bind w display-popup -E -w 60% -h 60% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | \
  fzf --reverse --header 'switch window' | \
  cut -d' ' -f1 | \
  xargs tmux switch-client -t"

# Lazygit popup (prefix + g)
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E lazygit

# Keybinding reference popup (prefix + ?)
bind ? display-popup -w 60% -h 80% -E keys

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind s choose-tree -Zs

# ── Prompt navigation ────────────────────────────────
# Jump between shell prompts in scrollback (like neovim jumplist).
# Uses OSC-133 prompt marks on tmux 3.4+, falls back to regex.
%if $IS_TMUX_3_4_OR_ABOVE
bind o {
  copy-mode
  send-keys -X previous-prompt
}
bind -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}
bind i {
  copy-mode
  send-keys -X next-prompt
}
bind -T copy-mode-vi -r i {
  send-keys -X next-prompt
}
%else
bind o {
  copy-mode
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r o {
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind i {
  copy-mode
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r i {
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
%endif

# ── Vi copy mode ─────────────────────────────────────
setw -g mode-keys vi
setw -g status-keys vi

# Enter copy mode
bind Enter copy-mode

# Search without entering copy mode first (like vim's / and ?)
bind / {
  copy-mode
  command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
    send-keys -X search-forward-incremental "%%"
  }
}

# Incremental search inside copy mode
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
  send-keys -X search-forward-incremental "%%"
}
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -T search -p "(search up)" {
  send-keys -X search-backward-incremental "%%"
}

# ── Visual selection state machine ───────────────────
# v toggles between VISUAL and NORMAL (second press clears selection).
bind -T copy-mode-vi v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL_BLOCK}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-off
      set -g @mode $VISUAL
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X begin-selection
    set -g @mode $VISUAL
  }

# V toggles between VISUAL_LINE and NORMAL.
bind -T copy-mode-vi V if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_BLOCK}}}' {
      send-keys -X rectangle-off
      send-keys -X select-line
      set -g @mode $VISUAL_LINE
    } {
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X select-line
    set -g @mode $VISUAL_LINE
  }

# C-v toggles between VISUAL_BLOCK and NORMAL.
bind -T copy-mode-vi C-v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-on
      set -g @mode $VISUAL_BLOCK
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-on
    send-keys -X begin-selection
    set -g @mode $VISUAL_BLOCK
  }

# Yank
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line

# Cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel

# Jump to start/end of line (like vim)
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line

# Page movement (like vim)
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# ── Mouse integration ────────────────────────────────
# Stay in copy mode on drag end
unbind -T copy-mode-vi MouseDragEnd1Pane

# Scroll 3 lines at a time; clear selection on scroll
bind -T copy-mode-vi WheelUpPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-up
  set -g @mode $NORMAL
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-down
  set -g @mode $NORMAL
}


# Mouse drag starts visual selection
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
} {
  copy-mode -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
}

# Scroll wheel enters copy mode
bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  if-shell -F "#{pane_in_mode}" "send-keys -X rectangle-off"
  set -g @mode $NORMAL
} {
  copy-mode -e
  send-keys -X rectangle-off
  set -g @mode $NORMAL
}

# ── Appearance ────────────────────────────────────────
# All styles use ANSI palette colors (colour0-15). The `theme` command
# reprograms the terminal palette via OSC escape sequences, so tmux
# picks up color changes automatically — no generated config files.
#
# Dark/light-dependent options (@theme-variant) are set by:
#   • the `theme` command (live switching via `tmux set`)
#   • the run-shell bootstrap below (startup, reads ~/.config/theme/current)
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 60
setw -g monitor-activity on
set -g visual-activity off

# Status bar — only tmux-level info (session, windows, time).
# Directory and git branch belong in the shell prompt, not here.
set -g status-style "bg=default,fg=default"

# Left: session name (wincent-style § separator)
set -g status-left "#[fg=colour5,bold,italics]#S § #[default]"

# Right: zoom indicator, time
set -g status-right "#{?window_zoomed_flag,#[fg=colour3]Z  ,}#(tmux-sysstat)  #[fg=colour8]%H:%M "

# Window tabs — index:command, active tab in reverse video
setw -g automatic-rename on
setw -g window-status-format "  #[fg=colour8]#I:#W "
setw -g window-status-current-format "  #[fg=colour4,bold,reverse] #I:#W #[default]"
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=colour3"
setw -g window-status-bell-style "fg=colour1"

# Pane borders — both set by theme bootstrap below
set -g pane-active-border-style "fg=colour8"
set -g pane-border-lines single
set -g pane-border-status bottom

# Copy mode info in pane border: position and search results
%hidden COPY_MODE_LEFT="#[align=left#,fg=green#,bg=black]  -- COPY --  #[default]"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"
%hidden OFFSET_FROM_TOP="#{e|-|:#{history_size},#{scroll_position}}"
%hidden COPY_MODE_LOCATION="[$OFFSET_FROM_TOP/#{history_size}]"

%if $IS_TMUX_3_5_OR_ABOVE
%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"
%else
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  $COPY_MODE_LOCATION  #[default]"
%endif

set -g pane-border-format "#{?$IS_COPY_MODE,$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,}"

# Messages and command prompt
set -g message-style "bg=default,fg=colour4"
set -g message-command-style "bg=default,fg=colour5"

# Popup borders
set -g popup-border-style "fg=colour8"
set -g popup-border-lines "rounded"

# Bootstrap dark/light-dependent options from data file on startup.
# The `theme` command sets these live; this only runs once at tmux start.
run-shell '\
  env_file="${XDG_CONFIG_HOME:-$HOME/.config}/theme/current"; \
  variant=dark; \
  [ -f "$env_file" ] && variant=$(grep "^variant=" "$env_file" | cut -d= -f2); \
  if [ "$variant" = "light" ]; then \
    pill_fg=colour7; border_dim=colour7; \
  else \
    pill_fg=colour0; border_dim=colour8; \
  fi; \
  tmux set -g pane-border-style "fg=$border_dim"; \
  tmux set -g pane-active-border-style "fg=$border_dim"; \
  tmux set -g mode-style "bg=colour4,fg=$pill_fg"; \
  tmux set -g copy-mode-match-style "bg=colour3,fg=$pill_fg"; \
  tmux set -g copy-mode-current-match-style "bg=colour6,fg=$pill_fg"'

# ── Plugins (TPM) ───────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @thumbs-key t
set -g @thumbs-command 'echo -n {} | pbcopy'

set -g @fzf-url-bind u
set -g @fzf-url-fzf-options '-w 60% -h 40% --prompt="  " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

TMUX_FZF_LAUNCH_KEY="C-f"

if "test ! -d $HOME/.local/share/tmux/plugins/tpm" \
   "run-shell -b 'git clone https://github.com/tmux-plugins/tpm $HOME/.local/share/tmux/plugins/tpm && $HOME/.local/share/tmux/plugins/tpm/bin/install_plugins'"

if "test -x $HOME/.local/share/tmux/plugins/tpm/tpm" \
   "run '$HOME/.local/share/tmux/plugins/tpm/tpm'"
