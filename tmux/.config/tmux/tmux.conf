# tmux.conf — main entry point.
# All configuration lives in conf.d/*.conf files, sourced in lexical order.
# The -q flag suppresses errors if no files match (e.g., fresh install).
# See: man tmux "SOURCE-FILE"
source-file -q ~/.config/tmux/conf.d/*.conf

# Per-machine overrides (not tracked in git).
source-file -q ~/.config/tmux/local.conf
