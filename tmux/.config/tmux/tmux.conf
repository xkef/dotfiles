# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Smulx=\E[4::%p1%dm"   # undercurl support
set -ag terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"  # undercurl colors

set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g set-clipboard on          # enable OSC 52 clipboard
set -g allow-passthrough on      # let OSC sequences reach the terminal
set -sg escape-time 0            # no delay for escape
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber on close
setw -g aggressive-resize on     # resize to smallest *viewing* client

# ── Prefix ────────────────────────────────────────────
# Ctrl-Space as prefix (wincent-style):
#   Space is the vim leader; Ctrl-Space is the tmux prefix.
#   Same physical key, Ctrl is the only differentiator.
#   Neither shadows anything useful: C-a is readline, C-b is page-up.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Ctrl-Space Ctrl-Space → toggle last window (like vim's C-^)
bind ^space last-window

# ── Keybindings ───────────────────────────────────────
# Reload config
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "Config reloaded"

# Split panes (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# ── FZF integration ──────────────────────────────────
# prefix + f → tmux-sessionizer (fzf project switcher)
bind f run-shell "tmux neww tmux-sessionizer"

# prefix + F → fzf switch between existing sessions
bind F display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --header 'switch session' \
    --preview 'tmux capture-pane -ep -t {}' | \
  xargs tmux switch-client -t"

# prefix + w → fzf switch between windows (all sessions)
bind w display-popup -E -w 60% -h 60% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | \
  fzf --reverse --header 'switch window' | \
  cut -d' ' -f1 | \
  xargs tmux switch-client -t"

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind s choose-tree -Zs

# ── Vi copy mode ─────────────────────────────────────
# Full vim-feeling: visual, visual-line, visual-block, motions, search.
setw -g mode-keys vi
setw -g status-keys vi

# Enter copy mode
bind Enter copy-mode
bind / copy-mode \; send-keys /    # prefix + / → search forward (like vim)

# Selection modes (like v, V, C-v in vim)
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Yank (copy)
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line    # like vim Y

# Cancel (like Escape in vim)
bind -T copy-mode-vi Escape send-keys -X cancel

# Incremental search
bind -T copy-mode-vi /   command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ?   command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""

# Jump to start/end of line (like vim)
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line

# Page movement (like vim)
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# OSC 52 handles clipboard automatically in Ghostty.
# Fallbacks for older/other setups:
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux" {
  if-shell "command -v wl-copy" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
  }
  if-shell "command -v xclip" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  }
}

# ── Appearance ────────────────────────────────────────
# Status bar uses ANSI palette colors (colour0-15) set by the terminal.
# The `theme` command reprograms the palette via OSC sequences —
# tmux picks up changes automatically on refresh.
set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 50
setw -g monitor-activity on
set -g visual-activity off

# Source generated theme config (created by `theme` command)
# Falls back to sane defaults if the file doesn't exist yet.
if-shell "test -f $HOME/.config/theme/tmux.conf" \
  "source-file $HOME/.config/theme/tmux.conf" \
  "set -g status-style 'bg=default,fg=default'"

# ── Plugins (TPM) ────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'         # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'         # auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator'      # seamless vim/tmux nav
set -g @plugin 'tmux-plugins/tmux-yank'              # clipboard integration

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @yank_action 'copy-pipe'                      # stay in copy mode after yank

# Initialize TPM (keep at bottom)
run "$HOME/.config/tmux/plugins/tpm/tpm"
