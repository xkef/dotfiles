# ── Version detection ──────────────────────────────────
# %hidden variables are scoped to the config file (not visible to users).
# These drive conditional blocks (%if) for features added in newer tmux.
# #{s|next-||:#{version}} strips the "next-" prefix from dev builds.
# #{e|>=|f|0:...} is a format-time numeric comparison (float, default 0).
# See: man tmux "FORMATS", "CONDITIONAL BLOCKS"
%hidden TMUX_VERSION="#{s|next-||:#{version}}"
%hidden IS_TMUX_3_4_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.4}"
%hidden IS_TMUX_3_5_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.5}"
%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"

# ── Vim-mode state machine ───────────────────────────
# Tracks the current visual selection mode for copy-mode-vi (see 02-copy-mode.conf).
# Uses tmux user options (@mode) as state, with numeric constants for comparison.
%hidden NORMAL=0
%hidden VISUAL=1
%hidden VISUAL_LINE=2
%hidden VISUAL_BLOCK=3
set -g @mode $NORMAL

# ── Terminal capabilities ────────────────────────────
# default-terminal: tells programs inside tmux what terminal to emulate.
# "tmux-256color" is a terminfo entry that supports 256 colors + italics.
# terminal-overrides: advertise true-color (RGB) support to the outer terminal.
# See: man tmux "TERMINFO EXTENSIONS", https://github.com/tmux/tmux/wiki/FAQ#how-do-i-use-rgb-colour
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended keys: enables CSI u mode for modified keys (e.g., Ctrl-Shift-A).
# Required for neovim and other tools that need precise modifier detection.
# See: https://github.com/tmux/tmux/wiki/Modifier-Keys
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Undercurl + colored underlines (used by neovim diagnostics, git signs).
# usstyle: enables styled underlines (curly, dotted, dashed + color).
# sync: synchronized output (reduces flicker on fast updates).
# See: man tmux "TERMINAL FEATURES"
set -as terminal-features ',*:usstyle'
set -as terminal-features ',*:sync'

# ── General options ──────────────────────────────────
set -g mouse on                     # enable mouse for scroll, resize, select
set -g history-limit 50000          # scrollback buffer per pane (default 2000)
set -g scroll-on-clear off          # `clear` doesn't push scrollback (preserves history)
set -g detach-on-destroy no-detached # on session destroy, switch to another (don't detach)
set -g display-time 4000            # status messages visible for 4 seconds
set -g status-interval 5            # refresh status bar every 5 seconds
set -g focus-events on              # forward FocusGained/Lost to programs (neovim uses this)
set -g set-clipboard on             # enable OSC 52 clipboard (copy from remote sessions)
set -g allow-passthrough on         # let OSC sequences (themes, images) reach the terminal
set -sg escape-time 0               # no delay after pressing Escape (critical for vim)
set -g base-index 1                 # number windows starting at 1 (0 is far from prefix key)
setw -g pane-base-index 1           # number panes starting at 1
set -g renumber-windows on          # closing window 2 renumbers 3→2, 4→3, etc.
setw -g aggressive-resize on        # resize to smallest *actively viewing* client (not attached)

# ── Prefix key ───────────────────────────────────────
# Ctrl-Space as prefix (inspired by wincent).
# Space is the neovim leader; Ctrl-Space is the tmux prefix — same physical
# key, Ctrl is the only differentiator. Neither shadows anything useful:
# Ctrl-A is readline beginning-of-line, Ctrl-B is page-up.
# See: https://github.com/wincent/wincent
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Double-tap prefix → toggle last window (analogous to vim's Ctrl-^)
bind ^space last-window
