# ── Appearance ────────────────────────────────────────
# All styles use ANSI palette colors (colour0-colour15) rather than hex.
# The `theme` command (see ~/.local/bin/theme) updates the Ghostty config,
# which reloads the terminal palette. Since tmux references palette slots,
# colors update automatically — no per-theme config or OSC sequences.
#
# ANSI color mapping (varies by theme, but semantics are stable):
#   colour0  = dark bg    colour8  = bright black (dim/border)
#   colour1  = red        colour9  = bright red
#   colour2  = green      colour10 = bright green
#   colour3  = yellow     colour11 = bright yellow
#   colour4  = blue       colour12 = bright blue
#   colour5  = magenta    colour13 = bright magenta
#   colour6  = cyan       colour14 = bright cyan
#   colour7  = light bg   colour15 = bright white

set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80

# monitor-activity: highlight window tab when something changes in the background.
# visual-activity off: don't show a status message, just change the tab style.
setw -g monitor-activity on
set -g visual-activity off

# ── Status bar ───────────────────────────────────────
# bg=default: transparent background (inherits terminal background).
# Only tmux-level info (session, windows, time) goes here.
# Directory and git branch belong in the shell prompt (starship), not here.
set -g status-style "bg=default,fg=default"

# Left: session name in magenta, followed by § separator (wincent style)
set -g status-left "#[fg=colour5,bold,italics]#S § #[default]"

# Right: zoom indicator (Z in yellow when a pane is zoomed), system stats,
# and clock in dim. tmux-sysstat is a custom script.
set -g status-right "#{?window_zoomed_flag,#[fg=colour3]Z,#[fg=default] }  #(tmux-sysstat)  #[fg=colour8]%H:%M  #[fg=colour6,bold]#h "

# ── Window tabs ──────────────────────────────────────
# automatic-rename: tmux names each window after the running command.
# Format: " index:command " — active window uses reverse video (bold blue).
# window-status-separator: empty string (spacing is in the format strings).
setw -g automatic-rename on
setw -g window-status-format "  #[fg=colour8] #I:#W #[default]"
setw -g window-status-current-format "  #[fg=colour4,bold,reverse] #I:#W #[default]"
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=colour3"  # yellow for activity
setw -g window-status-bell-style "fg=colour1"       # red for bell

# ── Pane borders ─────────────────────────────────────
# pane-border-status bottom: show a status line at the bottom of each pane.
# Used for copy-mode information (scroll position, search results).
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour8"
set -g pane-border-lines single
set -g pane-border-status bottom

# ── Copy mode pane border ────────────────────────────
# When in copy mode, the pane border shows:
#   Left:  "-- COPY --" indicator (green on black)
#   Right: scroll position [offset/total] and search result count (3.5+)
#
# Format variables:
#   #{copy_cursor_line} — absolute line of cursor (0-indexed from top of buffer)
#   #{history_size}     — lines scrolled off the visible area
#   #{pane_height}      — visible rows in the pane
#   #{search_count}     — number of search matches (tmux 3.5+)
#   #{search_count_partial} — true if count is still being computed
# Mode indicator: shows VISUAL/V-LINE/V-BLOCK when a selection is active,
# plain "COPY" otherwise. Uses @mode set by the state machine in 02-copy-mode.conf.
%hidden COPY_MODE_LABEL="#{?#{selection_present},#{?#{==:#{@mode},$VISUAL_BLOCK},V-BLOCK,#{?#{==:#{@mode},$VISUAL_LINE},V-LINE,VISUAL}},COPY}"
%hidden COPY_MODE_LEFT="#[align=left#,fg=green#,bg=black]  -- $COPY_MODE_LABEL --  #[default]"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"
%hidden COPY_MODE_TOTAL="#{e|+|:#{history_size},#{pane_height}}"
%hidden COPY_MODE_CURSOR="#{e|+|:#{e|-|:#{history_size},#{scroll_position}},#{copy_cursor_y}}"
%hidden COPY_MODE_LOCATION="[$COPY_MODE_CURSOR/$COPY_MODE_TOTAL]"

%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"

# Only show the pane border format when in copy mode (empty otherwise)
set -g pane-border-format "#{?#{==:#{pane_mode},copy-mode},$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,}"

# ── Messages and popups ─────────────────────────────
set -g message-style "bg=default,fg=colour4"         # command prompt: blue
set -g message-command-style "bg=default,fg=colour5"  # command mode: magenta
set -g popup-border-style "fg=colour8"                # popup borders: dim
set -g popup-border-lines "rounded"                   # rounded corners

# ── Selection and copy-mode styles ─────────────────────
set -g mode-style "bg=colour4,fg=colour0"
set -g copy-mode-match-style "bg=colour3,fg=colour0"
set -g copy-mode-current-match-style "bg=colour6,fg=colour0"
set -g copy-mode-mark-style "bg=colour5,fg=colour0"
