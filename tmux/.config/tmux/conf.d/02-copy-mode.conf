# ── Vi copy mode ─────────────────────────────────────
setw -g mode-keys vi
setw -g status-keys vi

# Enter copy mode
bind Enter copy-mode

# Search without entering copy mode first (like vim's / and ?)
bind / {
  copy-mode
  command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
    send-keys -X search-forward-incremental "%%"
  }
}

# Incremental search inside copy mode
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
  send-keys -X search-forward-incremental "%%"
}
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -T search -p "(search up)" {
  send-keys -X search-backward-incremental "%%"
}

# ── Visual selection state machine ───────────────────
# v toggles between VISUAL and NORMAL (second press clears selection).
bind -T copy-mode-vi v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL_BLOCK}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-off
      set -g @mode $VISUAL
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X begin-selection
    set -g @mode $VISUAL
  }

# V toggles between VISUAL_LINE and NORMAL.
bind -T copy-mode-vi V if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_BLOCK}}}' {
      send-keys -X rectangle-off
      send-keys -X select-line
      set -g @mode $VISUAL_LINE
    } {
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X select-line
    set -g @mode $VISUAL_LINE
  }

# C-v toggles between VISUAL_BLOCK and NORMAL.
bind -T copy-mode-vi C-v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-on
      set -g @mode $VISUAL_BLOCK
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-on
    send-keys -X begin-selection
    set -g @mode $VISUAL_BLOCK
  }

# Yank
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line

# Cancel — also reset @mode so the state machine stays consistent
bind -T copy-mode-vi Escape { send-keys -X cancel; set -g @mode $NORMAL }
bind -T copy-mode-vi q      { send-keys -X cancel; set -g @mode $NORMAL }

# Screen-position jumps (vim H/M/L)
bind -T copy-mode-vi H   send-keys -X top-line
bind -T copy-mode-vi L   send-keys -X bottom-line

# Page movement (like vim)
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# ── Mouse integration ────────────────────────────────
# Stay in copy mode on drag end
unbind -T copy-mode-vi MouseDragEnd1Pane

# Scroll 3 lines at a time; clear selection on scroll
bind -T copy-mode-vi WheelUpPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-up
  set -g @mode $NORMAL
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-down
  set -g @mode $NORMAL
}

# Mouse drag starts visual selection
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
} {
  copy-mode -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
}

# Scroll wheel enters copy mode
bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  if-shell -F "#{pane_in_mode}" "send-keys -X rectangle-off"
  set -g @mode $NORMAL
} {
  copy-mode -e
  send-keys -X rectangle-off
  set -g @mode $NORMAL
}
