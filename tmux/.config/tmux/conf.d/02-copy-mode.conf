# ── Vi copy mode ─────────────────────────────────────
# tmux copy mode lets you scroll, search, and select text from the scrollback
# buffer. With mode-keys vi, navigation uses hjkl, search uses /, selection
# uses v/V/C-v — matching vim muscle memory.
# See: man tmux "COPY MODE", "WINDOWS AND PANES" (mode-keys)
setw -g mode-keys vi
setw -g status-keys vi  # also use vi keys in the tmux command prompt

# Enter copy mode with prefix + Enter (in addition to the default prefix + [)
bind Enter copy-mode

# ── Search ───────────────────────────────────────────
# prefix + / enters copy mode and starts an incremental forward search.
# command-prompt -i enables incremental mode (results update as you type).
# -I "#{pane_search_string}" pre-fills with the last search term.
# -T search uses the "search" key table for search-specific bindings.
# See: man tmux "COMMAND-PROMPT"
bind / {
  copy-mode
  command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
    send-keys -X search-forward-incremental "%%"
  }
}

# / and ? inside copy mode: forward and backward incremental search
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
  send-keys -X search-forward-incremental "%%"
}
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -T search -p "(search up)" {
  send-keys -X search-backward-incremental "%%"
}

# ── Visual selection state machine ───────────────────
# Implements vim-like v/V/C-v toggling behavior in copy mode.
# Each key cycles through modes: pressing v in VISUAL returns to NORMAL
# (clears selection); pressing v in VISUAL_BLOCK switches to VISUAL.
#
# @mode (a tmux user option set in 00-options.conf) tracks the current state
# as a numeric value: 0=NORMAL, 1=VISUAL, 2=VISUAL_LINE, 3=VISUAL_BLOCK.
#
# #{selection_present} is true when there's an active selection.
# rectangle-on/off toggles between character and block selection.
# See: man tmux "COPY MODE" (begin-selection, select-line, rectangle-toggle)

# v: toggle VISUAL ↔ NORMAL (or switch from LINE/BLOCK → VISUAL)
bind -T copy-mode-vi v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL_BLOCK}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-off
      set -g @mode $VISUAL
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X begin-selection
    set -g @mode $VISUAL
  }

# V: toggle VISUAL_LINE ↔ NORMAL (or switch from VISUAL/BLOCK → LINE)
bind -T copy-mode-vi V if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_BLOCK}}}' {
      send-keys -X rectangle-off
      send-keys -X select-line
      set -g @mode $VISUAL_LINE
    } {
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X select-line
    set -g @mode $VISUAL_LINE
  }

# C-v: toggle VISUAL_BLOCK ↔ NORMAL (or switch from VISUAL/LINE → BLOCK)
bind -T copy-mode-vi C-v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-on
      set -g @mode $VISUAL_BLOCK
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-on
    send-keys -X begin-selection
    set -g @mode $VISUAL_BLOCK
  }

# ── Yank ─────────────────────────────────────────────
# y: copy selection to system clipboard (via OSC 52, set-clipboard on)
#    and cancel copy mode (back to normal pane view).
# Y: copy from cursor to end of line.
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line

# Cancel copy mode — also reset @mode so the state machine stays consistent
bind -T copy-mode-vi Escape { send-keys -X cancel; set -g @mode $NORMAL }
bind -T copy-mode-vi q      { send-keys -X cancel; set -g @mode $NORMAL }

# ── Navigation ──────────────────────────────────────
# H/L: jump to top/bottom visible line (like vim's H/L screen motions)
bind -T copy-mode-vi H   send-keys -X top-line
bind -T copy-mode-vi L   send-keys -X bottom-line

# Ctrl-U/D: half-page scroll (like vim)
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# ── Mouse integration ────────────────────────────────
# Disable the default behavior where mouse drag ends copy mode and copies.
# Instead, stay in copy mode so you can adjust the selection.
unbind -T copy-mode-vi MouseDragEnd1Pane

# Scroll 3 lines at a time (default is 5, which is too jumpy).
# Clear any active selection on scroll to prevent accidental expansion.
bind -T copy-mode-vi WheelUpPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-up
  set -g @mode $NORMAL
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-down
  set -g @mode $NORMAL
}

# Mouse drag starts a visual selection (character mode).
# #{mouse_any_flag}: true if the program in the pane handles mouse events
# (e.g., vim, less). In that case, forward the event with send-keys -M.
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
} {
  copy-mode -M
  send-keys -X rectangle-off
  set -g @mode $VISUAL
}

# Scroll wheel enters copy mode (if not already in it and the pane's
# program doesn't handle mouse). -e exits copy mode on scroll-to-bottom.
bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  if-shell -F "#{pane_in_mode}" "send-keys -X rectangle-off"
  set -g @mode $NORMAL
} {
  copy-mode -e
  send-keys -X rectangle-off
  set -g @mode $NORMAL
}
