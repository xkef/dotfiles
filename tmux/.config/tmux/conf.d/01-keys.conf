# ── Keybindings ───────────────────────────────────────
# Reload config
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "Config reloaded"

# Clear scrollback (analogous to bare C-l clearing the terminal)
bind C-l clear-history

# ── Smart pane navigation (tmux ↔ neovim) ────────────
# prefix + h/j/k/l move between tmux panes *and* neovim splits.
# When the active pane runs neovim, the key is forwarded so smart-splits.nvim
# handles it; otherwise tmux selects the adjacent pane directly.
# Using prefix (not bare C-hjkl) so zsh line-editing keys stay available.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
bind h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Split panes (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Window swapping (repeatable)
bind -r '<' swap-window -d -t '{previous}'
bind -r '>' swap-window -d -t '{next}'

# ── FZF integration ──────────────────────────────────
# prefix + f → tmux-sessionizer (fzf project picker)
bind f run-shell "tmux neww tmux-sessionizer"

# prefix + F → fzf switch between existing sessions
bind F display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --header 'switch session' \
    --preview 'tmux capture-pane -ep -t {}' | \
  xargs tmux switch-client -t"

# prefix + w → fzf switch between windows (all sessions)
bind w display-popup -E -w 60% -h 60% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | \
  fzf --reverse --header 'switch window' | \
  cut -d' ' -f1 | \
  xargs tmux switch-client -t"

# Lazygit popup (prefix + g)
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E lazygit

# Search and replace popup (prefix + R)
bind R display-popup -d '#{pane_current_path}' -w 90% -h 90% -E scooter

# Keybinding reference popup (prefix + ?)
bind ? display-popup -w 60% -h 80% -E keys

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind s choose-tree -Zs

# ── Prompt navigation ────────────────────────────────
# Jump between shell prompts in scrollback (like neovim jumplist).
# Uses OSC-133 prompt marks on tmux 3.4+, falls back to regex.
%if $IS_TMUX_3_4_OR_ABOVE
bind o {
  copy-mode
  send-keys -X previous-prompt
}
bind -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}
bind i {
  copy-mode
  send-keys -X next-prompt
}
bind -T copy-mode-vi -r i {
  send-keys -X next-prompt
}
%else
bind o {
  copy-mode
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r o {
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind i {
  copy-mode
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r i {
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
%endif
