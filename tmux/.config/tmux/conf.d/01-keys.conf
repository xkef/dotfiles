# ── Keybindings ───────────────────────────────────────
# All bindings use the prefix key (Ctrl-Space) unless noted otherwise.
# `bind -r` makes a binding repeatable (can press again within repeat-time
# without re-pressing prefix). Default repeat-time is 500ms.
# See: man tmux "KEY BINDINGS"

# Reload config without restarting tmux
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "Config reloaded"

# Clear scrollback history (Ctrl-L clears the terminal; this clears tmux's buffer)
bind C-l clear-history

# ── Smart pane navigation (tmux ↔ neovim) ────────────
# When the active pane runs neovim (or fzf), the key is forwarded via
# send-keys so neovim's smart-splits.nvim handles cross-split navigation.
# Otherwise, tmux selects the adjacent pane directly.
# This creates seamless navigation across tmux panes and neovim splits.
#
# The is_vim regex matches vim, nvim, view, vimdiff, fzf, etc.
# It checks the foreground process name via ps on the pane's tty.
# See: https://github.com/mrjones2014/smart-splits.nvim#tmux
#
# Unbind bare C-hjkl first: these bindings use prefix+hjkl instead,
# keeping C-hjkl available for zsh line editing (e.g., Ctrl-H = backspace).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
bind h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ── Splits and windows ──────────────────────────────
# -c "#{pane_current_path}": new pane/window inherits the current directory
# (default is the directory tmux was started in, which is rarely useful).
bind | split-window -h -c "#{pane_current_path}"  # vertical split (|)
bind - split-window -v -c "#{pane_current_path}"  # horizontal split (-)
unbind '"'  # remove default horizontal split
unbind %    # remove default vertical split

bind c new-window -c "#{pane_current_path}"

# Resize panes in 5-cell increments (repeatable — keep holding after prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation (repeatable)
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Window swapping (repeatable) — -d keeps focus on the moved window
# {previous}/{next} are tmux token targets for adjacent windows.
bind -r '<' swap-window -d -t '{previous}'
bind -r '>' swap-window -d -t '{next}'

# ── Fuzzy picker integration ────────────────────────
# display-popup creates a floating overlay. -E closes the popup when the
# command exits. -d sets the working directory. -w/-h set dimensions.
# See: man tmux "DISPLAY-POPUP"

# prefix + f → tmux-sessionizer: custom script that finds project dirs
# and creates/attaches a tmux session per project.
bind f run-shell "tmux neww tmux-sessionizer"

# prefix + F → fzf session switcher with live pane preview.
# `tmux capture-pane -ep -t {}` captures the visible content of each
# session's active pane for the preview window.
bind F display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --header 'switch session' \
    --preview 'tmux capture-pane -ep -t {}' | \
  xargs tmux switch-client -t"

# prefix + w → fzf window switcher across all sessions.
# Output format: "session:index window_name" — cut extracts the target.
bind w display-popup -E -w 60% -h 60% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | \
  fzf --reverse --header 'switch window' | \
  cut -d' ' -f1 | \
  xargs tmux switch-client -t"

# TUI tool popups — large floating windows (90% of terminal)
# lazygit: git UI  |  jjui: jujutsu UI  |  scooter: find-and-replace TUI
# See: https://github.com/jesseduffield/lazygit
# See: https://github.com/idursun/jjui
# See: https://github.com/thomasschafer/scooter
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E lazygit
bind G display-popup -d '#{pane_current_path}' -w 90% -h 90% -E jjui
bind R display-popup -d '#{pane_current_path}' -w 90% -h 90% -E scooter

# Keybinding reference — shows keys.md rendered by glow (markdown renderer)
bind ? display-popup -w 60% -h 80% -E keys

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"  # create named session
bind s choose-tree -Zs  # built-in session/window tree browser (-Z zooms, -s sessions only)

# ── Prompt navigation ────────────────────────────────
# Jump between shell prompts in scrollback, like a jumplist for commands.
#
# tmux 3.4+ supports OSC 133 prompt marks — shells emit these escape
# sequences at each prompt, and tmux's previous-prompt/next-prompt
# commands use them for precise navigation.
# See: https://github.com/tmux/tmux/wiki/FAQ#how-do-i-jump-between-prompts
#
# Fallback (pre-3.4): search for the prompt character (❯ from starship).
# cursor-right x2 skips past the prompt marker to the command text.
%if $IS_TMUX_3_4_OR_ABOVE
bind o {
  copy-mode
  send-keys -X previous-prompt
}
bind -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}
bind i {
  copy-mode
  send-keys -X next-prompt
}
bind -T copy-mode-vi -r i {
  send-keys -X next-prompt
}
%else
bind o {
  copy-mode
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r o {
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind i {
  copy-mode
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind -T copy-mode-vi -r i {
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
%endif
