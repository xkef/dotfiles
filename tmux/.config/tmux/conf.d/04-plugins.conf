# ── Plugins (TPM) ───────────────────────────────────
# TPM (Tmux Plugin Manager) manages plugin installation and loading.
# Plugins are installed to $TMUX_PLUGIN_MANAGER_PATH (XDG-compliant path).
# Install: prefix + I  |  Update: prefix + U  |  Clean: prefix + alt-u
# See: https://github.com/tmux-plugins/tpm
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'

# tmux-thumbs: press prefix + t to highlight and copy text patterns
# (URLs, hashes, IPs, file paths) with hint characters (like vim-easymotion).
# See: https://github.com/fcsonline/tmux-thumbs
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key t
# Copy to system clipboard (cross-platform: macOS/Wayland/X11)
set -g @thumbs-command 'echo -n {} | (pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -sel clip 2>/dev/null)'

# tmux-fzf-url: press prefix + u to extract and open URLs from scrollback.
# Uses fzf to pick from all URLs visible in the pane's history.
# See: https://github.com/wfxr/tmux-fzf-url
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind u
set -g @fzf-url-fzf-options '-w 60% -h 40% --prompt="  " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ── TPM bootstrap ───────────────────────────────────
# Auto-install TPM on first run, then load it.
# The `if` command checks a condition and runs a command if true.
# -b runs the command in the background (doesn't block tmux startup).
if "test ! -d $HOME/.local/share/tmux/plugins/tpm" \
   "run-shell -b 'git clone https://github.com/tmux-plugins/tpm $HOME/.local/share/tmux/plugins/tpm && $HOME/.local/share/tmux/plugins/tpm/bin/install_plugins'"

if "test -x $HOME/.local/share/tmux/plugins/tpm/tpm" \
   "run '$HOME/.local/share/tmux/plugins/tpm/tpm'"
