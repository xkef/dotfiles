## Atuin config
## https://docs.atuin.sh/configuration/config/

# Minimal UI
style = "compact"
invert = true
show_preview = false
show_help = false
show_tabs = false
max_preview_height = 0
exit_mode = "return-query"

[logs]
dir = "~/.local/share/atuin/logs"

[sync]
records = false

[keys]
scroll_exits = true
