default_channel = "files"

[ui]
theme = "catppuccin"

[ui.input_bar]
border_type = "rounded"

[ui.results_panel]
border_type = "rounded"

[ui.preview_panel]
border_type = "rounded"

[shell_integration]
fallback_channel = "files"

[shell_integration.keybindings]
smart_autocomplete = "alt-t"

[shell_integration.channel_triggers]
"dirs" = ["cd", "ls", "rmdir", "z"]
"files" = ["cat", "less", "head", "tail", "bat", "cp", "mv", "rm", "touch", "chmod", "ln"]
"git-diff" = ["git add", "git restore"]
"git-branch" = ["git checkout", "git branch", "git merge", "git rebase"]
"git-log" = ["git log", "git show"]
"git-repos" = ["nvim", "code"]
"env" = ["export", "unset"]
"alias" = ["alias", "unalias"]
"zoxide" = ["z"]
