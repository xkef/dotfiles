# Yazi file manager configuration

[manager]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = false
show_symlink = true
linemode = "size"

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15

[opener]
edit = [{ run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" }]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "*/xml", use = "edit" },
  { name = "*.toml", use = "edit" },
]
