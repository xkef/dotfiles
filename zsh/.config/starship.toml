command_timeout = 5000

format = """
${custom.cwd}\
$character"""

right_format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
${custom.jj_change}\
${custom.jj_status}\
$java\
$python\
$nodejs\
$docker_context"""

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

[directory]
truncation_length = 8
truncate_to_repo = false
fish_style_pwd_dir_length = 1
truncation_symbol = '…/'
style = 'dimmed cyan'

[git_branch]
format = '[$symbol$branch]($style) '
symbol = ' '
style = 'purple'

[git_status]
format = '($stashed$staged$modified$untracked$conflicted$ahead_behind)'
stashed = '[*${count}](yellow) '
staged = '[+${count}](green) '
modified = '[!${count}](red) '
untracked = '[?${count}](blue) '
conflicted = '[=${count}](bold red) '
ahead = '[⇡${count}](green) '
behind = '[⇣${count}](red) '
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](bold red) '

[git_metrics]
disabled = false
added_style = 'green'
deleted_style = 'red'
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[java]
format = '[$symbol($version)]($style) '
symbol = ' '

[python]
format = '[$symbol($version)($virtualenv)]($style) '
symbol = ' '

[nodejs]
format = '[$symbol($version)]($style) '
symbol = ' '

[docker_context]
format = '[$symbol$context]($style) '
symbol = ' '

[custom.jj_change]
command = '''jj log --no-graph -r @ -T 'separate(" ", change_id.shortest(8), bookmarks.join(", "))' 2>/dev/null'''
when = 'jj root 2>/dev/null'
format = '[ $output]($style) '
style = 'purple'

[custom.jj_status]
command = '''
o=""
flags=$(jj log --no-graph -r @ -T 'separate(",", if(conflict, "c"), if(empty, "e"))' 2>/dev/null)
case "$flags" in *c*) o="${o}⚠ ";; esac
case "$flags" in *e*) o="${o}∅ ";; esac
s=$(jj diff --summary 2>/dev/null)
if [ -n "$s" ]; then
  a=$(printf '%s\n' "$s" | grep -c '^A')
  m=$(printf '%s\n' "$s" | grep -c '^M')
  d=$(printf '%s\n' "$s" | grep -c '^D')
  [ "$a" -gt 0 ] && o="${o}+${a} "
  [ "$m" -gt 0 ] && o="${o}!${m} "
  [ "$d" -gt 0 ] && o="${o}-${d} "
fi
printf '%s' "$o"
'''
when = 'jj root 2>/dev/null'
format = '($output)'
style = 'yellow'

[custom.cwd]
command = 'basename "$PWD"'
when = true
format = '[$output](bold cyan) '
