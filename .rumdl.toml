# Markdown linter config (migrated from .markdownlint-cli2.yaml).
# rumdl respects .gitignore, so node_modules and untracked generated files are
# skipped automatically. The excludes below cover tracked-but-generated files
# rendered by `make ai-render`.

[global]
disable = ["MD025", "MD036", "MD041"]
exclude = [
    "ai/.claude/CLAUDE.md",
    "ai/.codex/AGENTS.md",
    "ai/.config/opencode/AGENTS.md",
    "ai/.pi/agent/AGENTS.md",
]

[MD013]
tables = false
