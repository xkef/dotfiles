[stow]
brew = "stow"
pacman = "stow"
script = """
set -e
V=2.4.0
curl -Lo /tmp/stow.tar.gz "https://ftp.gnu.org/gnu/stow/stow-${V}.tar.gz"
tar -xzf /tmp/stow.tar.gz -C /tmp
cd /tmp/stow-${V}
./configure --prefix="$HOME/.local"
make install
rm -rf "/tmp/stow-${V}" /tmp/stow.tar.gz
"""

[git]
brew = "git"
pacman = "git"
script = """
set -e
V=$(curl -sL https://api.github.com/repos/git/git/releases/latest | sed -n 's/.*"tag_name": *"v\\([^"]*\\)".*/\\1/p')
curl -Lo /tmp/git.tar.gz "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${V}.tar.gz"
tar -xzf /tmp/git.tar.gz -C /tmp
cd /tmp/git-${V}
make prefix="$HOME/.local" NO_GETTEXT=1 NO_TCLTK=1 -j"$(nproc 2>/dev/null || echo 1)" all install
rm -rf "/tmp/git-${V}" /tmp/git.tar.gz
"""

[curl]
brew = "curl"
pacman = "curl"
script = """
set -e
V=$(curl -sL https://api.github.com/repos/curl/curl/releases/latest | sed -n 's/.*"tag_name": *"curl-\\([^"]*\\)".*/\\1/p' | tr _ .)
curl -Lo /tmp/curl-src.tar.gz "https://curl.se/download/curl-${V}.tar.gz"
tar -xzf /tmp/curl-src.tar.gz -C /tmp
cd /tmp/curl-${V}
./configure --prefix="$HOME/.local" --with-openssl
make -j"$(nproc 2>/dev/null || echo 1)"
make install
rm -rf "/tmp/curl-${V}" /tmp/curl-src.tar.gz
"""

[zsh]
brew = "zsh"
pacman = "zsh"
script = """
set -e
V=5.9.1
curl -Lo /tmp/zsh.tar.xz "https://sourceforge.net/projects/zsh/files/zsh/${V}/zsh-${V}.tar.xz/download"
tar -xf /tmp/zsh.tar.xz -C /tmp
cd /tmp/zsh-${V}
./configure --prefix="$HOME/.local"
make -j"$(nproc 2>/dev/null || echo 1)"
make install
rm -rf "/tmp/zsh-${V}" /tmp/zsh.tar.xz
"""

[tmux]
brew = "tmux"
pacman = "tmux"
script = """
set -e
TAG=$(curl -sL https://api.github.com/repos/tmux/tmux/releases/latest | sed -n 's/.*"tag_name": *"\\([^"]*\\)".*/\\1/p')
curl -Lo /tmp/tmux.tar.gz "https://github.com/tmux/tmux/releases/download/${TAG}/tmux-${TAG}.tar.gz"
tar -xzf /tmp/tmux.tar.gz -C /tmp
cd /tmp/tmux-${TAG}
./configure --prefix="$HOME/.local"
make -j"$(nproc 2>/dev/null || echo 1)"
make install
rm -rf "/tmp/tmux-${TAG}" /tmp/tmux.tar.gz
"""

[nvim]
brew = "neovim"
pacman = "neovim"
script = """
set -e
ARCH=$(uname -m)
case "$ARCH" in aarch64) ARCH=arm64 ;; esac
mkdir -p "$HOME/.local"
curl -Lo /tmp/nvim.tar.gz "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-${ARCH}.tar.gz"
tar -xzf /tmp/nvim.tar.gz -C "$HOME/.local" --strip-components=1
rm /tmp/nvim.tar.gz
"""

[eza]
brew = "eza"
pacman = "eza"
script = """
set -e
BIN="$HOME/.local/bin" && mkdir -p "$BIN"
ARCH=$(uname -m)
case "$ARCH" in arm64) ARCH=aarch64 ;; esac
curl -Lo /tmp/eza.tar.gz "https://github.com/eza-community/eza/releases/latest/download/eza_${ARCH}-unknown-linux-gnu.tar.gz"
tar -xzf /tmp/eza.tar.gz -C /tmp
cp /tmp/eza "$BIN/"
rm -f /tmp/eza /tmp/eza.tar.gz
"""

