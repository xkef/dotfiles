[fzf]
brew = "fzf"
pacman = "fzf"
script = """
set -e
BIN="$HOME/.local/bin" && mkdir -p "$BIN"
ARCH=$(uname -m)
case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64) ARCH=arm64 ;; esac
TAG=$(curl -sL https://api.github.com/repos/junegunn/fzf/releases/latest | sed -n 's/.*"tag_name": *"\\([^"]*\\)".*/\\1/p')
V=${TAG#v}
curl -Lo /tmp/fzf.tar.gz "https://github.com/junegunn/fzf/releases/download/${TAG}/fzf-${V}-linux_${ARCH}.tar.gz"
tar -xzf /tmp/fzf.tar.gz -C "$BIN" fzf
rm /tmp/fzf.tar.gz
"""

[zoxide]
brew = "zoxide"
pacman = "zoxide"
script = "curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"

[jq]
brew = "jq"
pacman = "jq"
script = """
set -e
BIN="$HOME/.local/bin" && mkdir -p "$BIN"
ARCH=$(uname -m)
case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64) ARCH=arm64 ;; esac
curl -Lo "$BIN/jq" "https://github.com/jqlang/jq/releases/latest/download/jq-linux-${ARCH}"
chmod +x "$BIN/jq"
"""

