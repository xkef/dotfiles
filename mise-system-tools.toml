# System tools for Linux without a package manager (non-macOS, non-Arch).
# On macOS these come from Brewfile; on Arch from pkgs.arch.
#
# Copied to ~/.config/mise/system-tools.toml by the install script and
# loaded via `includes` in the global mise config.
#
# Prerequisites (need a system package manager):
#   stow, git, curl, zsh, jdtls

[tools]
tmux = "3"
neovim = "0"
eza = "0"
bat = "0"
fd = "10"
ripgrep = "15"
delta = "0"
lazygit = "0"
fzf = "0"
jq = "1"
zoxide = "0"
starship = "1"
atuin = "18"
navi = "2"
yazi = "26"
hyperfine = "1"
tokei = "14"
difftastic = "0"
sd = "1"
dust = "1"
duf = "0"
procs = "0"
